document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};

      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +

            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(60px);opacity:.5;z-index:0;width:300px;height:300px;background:radial-gradient(circle,#c9f3fb,transparent 70%);bottom:-120px;left:-40px;animation:drift 20s ease-in-out infinite reverse\"><\u002Fspan>\n    <div style=\"position:relative;z-index:2;max-width:900px;margin:auto\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:.8rem;letter-spacing:.28em;text-transform:uppercase;color:#0056b3\"><span style=\"color:#00e1ff\">◇ <\u002Fspan>Embedded ML · Personal build<\u002Fspan>\n      <h1 style=\"font-family:'IBM Plex Mono',monospace;font-size:clamp(2.1rem,5vw,3.3rem);color:#002b5c;margin:.8rem 0 1rem;line-height:1.1\">Running real-time AI perception onboard a drone<\u002Fh1>\n      <p style=\"font-size:1.25rem;color:#33415a;max-width:680px\">A solo project: build a quadcopter from a kit and put a real AI brain on it — an NVIDIA Jetson that detects and tracks objects live, in flight. The end-to-end proof that I can take embedded machine learning all the way onto real flying hardware.<\u002Fp>\n      <div style=\"display:inline-flex;align-items:center;gap:.5rem;margin-top:1.6rem;font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:#002b5c;background:#fff;border:1px solid #bfe3c5;box-shadow:0 6px 18px rgba(0,43,92,.08);padding:.5rem .9rem;border-radius:999px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#22b455;animation:pulse 1.8s infinite\"><\u002Fspan> In active development — summer build<\u002Fdiv>\n      <div style=\"margin-top:2rem;display:flex;gap:.8rem;flex-wrap:wrap\">\n        <a href=\"REPLACE_WITH_DRONE_GITHUB_URL\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:600;text-decoration:none;padding:.6rem 1.1rem;border-radius:8px;display:inline-flex;align-items:center;gap:.5rem;background:#002b5c;color:#fff;box-shadow:0 8px 20px rgba(0,43,92,.2)\" style-hover=\"background:#00224a;transform:translateY(-2px)\">View on GitHub ↗<\u002Fa>\n        <a href=\"#how\" style=\"font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:600;text-decoration:none;padding:.6rem 1.1rem;border-radius:8px;display:inline-flex;align-items:center;gap:.5rem;background:#fff;color:#002b5c;border:1.5px solid #cfe0f7\" style-hover=\"background:#eef4ff\">Explore the build ↓<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section style=\"max-width:900px;margin:auto;padding:3rem 1.5rem;border-bottom:1px solid #eef1f6\">\n    <h2 data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:1.6rem;color:#004aad;margin-bottom:1rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Why I'm building it<\u002Fh2>\n    <p data-reveal=\"\" style=\"font-size:1.08rem;color:#2b3651;margin-bottom:1rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">My team projects proved the software; this one proves I can own the <strong style=\"color:#002b5c\">entire chain myself<\u002Fstrong> — from screwing the frame together to deploying a neural network that runs onboard and influences how the aircraft flies.<\u002Fp>\n    <p data-reveal=\"\" style=\"font-size:1.08rem;color:#2b3651;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">It's the project that ties everything together: perception, embedded deployment, and real hardware integration — the exact profile the autonomous-systems industry is looking for.<\u002Fp>\n  <\u002Fsection>\n\n  <section id=\"how\" data-scroll-section=\"\" style=\"position:relative;height:440vh;background:linear-gradient(180deg,#f8f9fa 0%,#eef4fc 18%,#eef4fc 82%,#f8f9fa 100%)\">\n    <div data-stage=\"\" style=\"position:sticky;top:0;height:100vh;overflow:hidden\">\n      <span style=\"position:absolute;width:540px;height:540px;border-radius:50%;filter:blur(80px);opacity:.55;background:radial-gradient(circle,#c7e0fb,transparent 70%);top:8%;left:50%;transform:translateX(-50%);pointer-events:none\"><\u002Fspan>\n      <span style=\"position:absolute;width:360px;height:360px;border-radius:50%;filter:blur(70px);opacity:.5;background:radial-gradient(circle,#bdf4fb,transparent 70%);bottom:4%;left:46%;transform:translateX(-50%);pointer-events:none\"><\u002Fspan>\n\n      <div style=\"position:absolute;top:26px;left:0;width:100%;text-align:center;z-index:6;pointer-events:none;padding:0 1.5rem\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;color:#0056b3\"><span style=\"color:#00e1ff\">◇ <\u002Fspan>Anatomy of the build<\u002Fspan>\n        <h2 style=\"font-family:'IBM Plex Mono',monospace;font-size:clamp(1.4rem,3vw,2rem);color:#002b5c;margin:.35rem 0 0;line-height:1.15\">Exploded view — how it goes together<\u002Fh2>\n      <\u002Fdiv>\n\n      <canvas data-canvas=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;z-index:2\"><\u002Fcanvas>\n\n      <svg data-svg=\"\" style=\"position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:3\">\n        <polyline data-flow=\"\" points=\"\" fill=\"none\" stroke=\"#00e1ff\" stroke-width=\"1.6\" stroke-dasharray=\"3 7\" stroke-linecap=\"round\" opacity=\"0\"><\u002Fpolyline>\n        <line data-line=\"pix\" stroke=\"#00e1ff\" stroke-width=\"1.4\" opacity=\"0\"><\u002Fline>\n        <line data-line=\"bat\" stroke=\"#00e1ff\" stroke-width=\"1.4\" opacity=\"0\"><\u002Fline>\n        <line data-line=\"jet\" stroke=\"#00e1ff\" stroke-width=\"1.4\" opacity=\"0\"><\u002Fline>\n        <circle data-dot=\"pix\" r=\"3.4\" fill=\"#00e1ff\" opacity=\"0\"><\u002Fcircle>\n        <circle data-dot=\"bat\" r=\"3.4\" fill=\"#00e1ff\" opacity=\"0\"><\u002Fcircle>\n        <circle data-dot=\"jet\" r=\"3.4\" fill=\"#00e1ff\" opacity=\"0\"><\u002Fcircle>\n        <circle data-flowdot=\"0\" r=\"3.2\" fill=\"#00e1ff\" opacity=\"0\"><\u002Fcircle>\n        <circle data-flowdot=\"1\" r=\"3.2\" fill=\"#00e1ff\" opacity=\"0\"><\u002Fcircle>\n        <circle data-flowdot=\"2\" r=\"3.2\" fill=\"#00e1ff\" opacity=\"0\"><\u002Fcircle>\n      <\u002Fsvg>\n\n      <div data-card=\"jet\" style=\"position:absolute;top:0;left:0;width:248px;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 18px 44px rgba(0,43,92,.16);border:1px solid #e3e9f3;opacity:0;transition:opacity .45s ease;pointer-events:none;z-index:5;will-change:transform\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\"><span style=\"width:22px;height:2px;background:#00e1ff;border-radius:2px\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:#0070f3\">LAYER 03 · TOP<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;color:#002b5c;margin-bottom:4px\">Jetson Orin Nano + camera<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:12.5px;line-height:1.5;color:#33415a\">Embedded AI payload. The camera feeds the Jetson, which runs YOLO + ByteTrack (TensorRT) and sends targets to the Pixhawk over MAVLink.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-card=\"bat\" style=\"position:absolute;top:0;left:0;width:248px;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 18px 44px rgba(0,43,92,.16);border:1px solid #e3e9f3;opacity:0;transition:opacity .45s ease;pointer-events:none;z-index:5;will-change:transform\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\"><span style=\"width:22px;height:2px;background:#00e1ff;border-radius:2px\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:#0070f3\">LAYER 02 · MIDDLE<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;color:#002b5c;margin-bottom:4px\">3S LiPo · 4200 mAh<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:12.5px;line-height:1.5;color:#33415a\">The power source. ~11.1 V drives the four motors through the PDB and feeds the avionics via a step-down converter.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-card=\"pix\" style=\"position:absolute;top:0;left:0;width:248px;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 18px 44px rgba(0,43,92,.16);border:1px solid #e3e9f3;opacity:0;transition:opacity .45s ease;pointer-events:none;z-index:5;will-change:transform\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\"><span style=\"width:22px;height:2px;background:#00e1ff;border-radius:2px\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:#0070f3\">LAYER 01 · BOTTOM<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;color:#002b5c;margin-bottom:4px\">Pixhawk 2.4.8<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:12.5px;line-height:1.5;color:#33415a\">Flight controller — runs PX4 / ArduPilot for stabilization, GPS waypoints and motor mixing. The low-level flight brain.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-card=\"data\" style=\"position:absolute;left:50%;bottom:30px;transform:translateX(-50%);width:auto;max-width:90vw;background:#002b5c;border-radius:12px;padding:10px 16px;box-shadow:0 18px 44px rgba(0,43,92,.28);opacity:0;transition:opacity .45s ease;pointer-events:none;z-index:5\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;color:#fff\">DATA PATH&nbsp;&nbsp;<span style=\"color:#00e1ff\">Camera → Jetson → Pixhawk<\u002Fspan>&nbsp;&nbsp;·&nbsp;&nbsp;MAVLink<\u002Fspan>\n      <\u002Fdiv>\n\n      <div data-pill=\"motor\" style=\"position:absolute;top:0;left:0;opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:4;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #d6e2f3;box-shadow:0 6px 16px rgba(0,43,92,.12);border-radius:999px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;color:#002b5c\"><span style=\"width:6px;height:6px;border-radius:50%;background:#00e1ff;box-shadow:0 0 8px #00e1ff\"><\u002Fspan>BRUSHLESS MOTOR<\u002Fdiv>\n      <div data-pill=\"esc\" style=\"position:absolute;top:0;left:0;opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:4;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #d6e2f3;box-shadow:0 6px 16px rgba(0,43,92,.12);border-radius:999px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;color:#002b5c\"><span style=\"width:6px;height:6px;border-radius:50%;background:#00e1ff;box-shadow:0 0 8px #00e1ff\"><\u002Fspan>20A ESC<\u002Fdiv>\n      <div data-pill=\"prop\" style=\"position:absolute;top:0;left:0;opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:4;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #d6e2f3;box-shadow:0 6px 16px rgba(0,43,92,.12);border-radius:999px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;color:#002b5c\"><span style=\"width:6px;height:6px;border-radius:50%;background:#00e1ff;box-shadow:0 0 8px #00e1ff\"><\u002Fspan>9450 PROP<\u002Fdiv>\n      <div data-pill=\"gps\" style=\"position:absolute;top:0;left:0;opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:4;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #d6e2f3;box-shadow:0 6px 16px rgba(0,43,92,.12);border-radius:999px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.08em;color:#002b5c\"><span style=\"width:6px;height:6px;border-radius:50%;background:#00e1ff;box-shadow:0 0 8px #00e1ff\"><\u002Fspan>GPS + COMPASS<\u002Fdiv>\n\n      <div data-hint=\"\" style=\"position:absolute;left:50%;bottom:26px;transform:translate(-50%,0);z-index:6;pointer-events:none;font-family:'IBM Plex Mono',monospace;font-size:.78rem;letter-spacing:.16em;color:#0056b3;animation:hintb 1.8s ease-in-out infinite\">SCROLL TO DISASSEMBLE ↓<\u002Fdiv>\n\n      <div data-fallback=\"\" style=\"display:none;position:absolute;inset:0;z-index:7;overflow:auto;padding:5.5rem 1.5rem 2rem;background:linear-gradient(180deg,#f8f9fa,#eef4fc)\">\n        <div style=\"max-width:560px;margin:auto;display:flex;flex-direction:column;gap:14px\">\n          <div style=\"background:#fff;border:1px solid #e3e9f3;border-left:4px solid #00e1ff;border-radius:12px;padding:1rem 1.2rem;box-shadow:0 8px 24px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:#0070f3\">LAYER 03 · TOP<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#002b5c;margin:3px 0\">Jetson Orin Nano + camera<\u002Fdiv><div style=\"font-size:13px;color:#33415a\">Embedded AI payload — YOLO + ByteTrack on TensorRT, talking to the Pixhawk over MAVLink.<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:center;color:#0056b3;font-family:'IBM Plex Mono',monospace\">↑<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e3e9f3;border-left:4px solid #00e1ff;border-radius:12px;padding:1rem 1.2rem;box-shadow:0 8px 24px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:#0070f3\">LAYER 02 · MIDDLE<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#002b5c;margin:3px 0\">3S LiPo · 4200 mAh<\u002Fdiv><div style=\"font-size:13px;color:#33415a\">Power source — ~11.1 V to motors via the PDB, avionics via a step-down.<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:center;color:#0056b3;font-family:'IBM Plex Mono',monospace\">↑<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e3e9f3;border-left:4px solid #00e1ff;border-radius:12px;padding:1rem 1.2rem;box-shadow:0 8px 24px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:#0070f3\">LAYER 01 · BOTTOM<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#002b5c;margin:3px 0\">Pixhawk 2.4.8<\u002Fdiv><div style=\"font-size:13px;color:#33415a\">Flight controller — stabilization, GPS waypoints, motor mixing.<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:center;color:#0056b3;font-family:'IBM Plex Mono',monospace\">↑<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e3e9f3;border-left:4px solid #0070f3;border-radius:12px;padding:1rem 1.2rem;box-shadow:0 8px 24px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:#0070f3\">AIRFRAME<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:#002b5c;margin:3px 0\">F450 quad · 4× motor / ESC / 9450 prop · GPS<\u002Fdiv><div style=\"font-size:13px;color:#33415a\">450 mm frame with brushless motors, 20A ESCs and self-tightening props.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <main style=\"max-width:900px;margin:auto;padding:1rem 1.5rem 2rem\">\n    <section style=\"padding:3rem 0;border-bottom:1px solid #eef1f6\">\n      <h2 data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:1.6rem;color:#004aad;margin-bottom:1rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">The perception pipeline<\u002Fh2>\n      <p data-reveal=\"\" style=\"font-size:1.08rem;color:#2b3651;margin-bottom:1rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">A small AI computer rides on the drone and does the thinking in real time:<\u002Fp>\n      <div data-reveal=\"\" style=\"position:relative;display:flex;flex-wrap:wrap;gap:.7rem;align-items:stretch;margin:1.6rem 0 .6rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">\n        <div style=\"flex:1;min-width:130px;background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem;text-align:center;box-shadow:0 8px 22px rgba(0,43,92,.08)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">See<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.25rem;font-size:.96rem\">Onboard camera<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;min-width:130px;background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem;text-align:center;box-shadow:0 8px 22px rgba(0,43,92,.08)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Think<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.25rem;font-size:.96rem\">Jetson — YOLO + ByteTrack<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;min-width:130px;background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem;text-align:center;box-shadow:0 8px 22px rgba(0,43,92,.08)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Speed up<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.25rem;font-size:.96rem\">TensorRT<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;min-width:130px;background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem;text-align:center;box-shadow:0 8px 22px rgba(0,43,92,.08)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Talk<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.25rem;font-size:.96rem\">MAVLink<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;min-width:130px;background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem;text-align:center;box-shadow:0 8px 22px rgba(0,43,92,.08)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Fly<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.25rem;font-size:.96rem\">Pixhawk<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"height:3px;background:rgba(0,112,243,.15);border-radius:3px;position:relative;overflow:hidden;margin-top:.4rem;opacity:0;transition:opacity .7s cubic-bezier(.2,.7,.2,1)\"><span style=\"content:'';position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(90deg,transparent,#00e1ff,transparent);animation:slide 2.4s linear infinite\"><\u002Fspan><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#fff;border-left:4px solid #0070f3;border-radius:10px;padding:1.1rem 1.3rem;box-shadow:0 8px 24px rgba(0,43,92,.07);margin:1.2rem 0;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">\n        <p style=\"margin:0;font-size:1.05rem;color:#2b3651\"><strong style=\"color:#002b5c\">In plain terms:<\u002Fstrong> the camera feeds the Jetson, which detects and tracks targets with a neural network — sped up with TensorRT so it runs fast enough on a small embedded chip. The Jetson then talks to the flight controller (Pixhawk) to influence the flight. In the air, everything is powered from the drone's own battery through a step-down converter.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:3rem 0;border-bottom:1px solid #eef1f6\">\n      <h2 data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:1.6rem;color:#004aad;margin-bottom:1rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">The build<\u002Fh2>\n      <div data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.8rem;margin-top:1.2rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">\n        <div style=\"background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem 1.1rem;box-shadow:0 8px 22px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Airframe<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.2rem\">F450 quadcopter<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem 1.1rem;box-shadow:0 8px 22px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Flight controller<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.2rem\">Pixhawk 2.4.8<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem 1.1rem;box-shadow:0 8px 22px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">AI compute<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.2rem\">Jetson Orin Nano<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem 1.1rem;box-shadow:0 8px 22px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Perception<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.2rem\">YOLO + ByteTrack<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem 1.1rem;box-shadow:0 8px 22px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Optimization<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.2rem\">TensorRT<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e3e9f3;border-radius:12px;padding:1rem 1.1rem;box-shadow:0 8px 22px rgba(0,43,92,.07)\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:#0070f3\">Link<\u002Fdiv><div style=\"font-weight:700;color:#002b5c;margin-top:.2rem\">MAVLink<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"padding:3rem 0;border-bottom:1px solid #eef1f6\">\n      <h2 data-reveal=\"\" style=\"font-family:'IBM Plex Mono',monospace;font-size:1.6rem;color:#004aad;margin-bottom:1rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">Progress<\u002Fh2>\n      <ul data-reveal=\"\" style=\"list-style:none;margin-top:1rem;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">\n        <li style=\"position:relative;padding-left:1.8rem;margin-bottom:.7rem;color:#2b3651\"><span style=\"position:absolute;left:0;top:0;color:#22b455;font-weight:700\">✓<\u002Fspan>Hardware selected and assembled (F450 + Pixhawk + Jetson + camera)<\u002Fli>\n        <li style=\"position:relative;padding-left:1.8rem;margin-bottom:.7rem;color:#2b3651\"><span style=\"position:absolute;left:0;top:0;color:#22b455;font-weight:700\">✓<\u002Fspan>Camera pipeline functional on the Jetson<\u002Fli>\n        <li style=\"position:relative;padding-left:1.8rem;margin-bottom:.7rem;color:#2b3651\"><span style=\"position:absolute;left:0;top:0;color:#0070f3;font-weight:700\">○<\u002Fspan>Onboard real-time detection &amp; tracking<\u002Fli>\n        <li style=\"position:relative;padding-left:1.8rem;margin-bottom:.7rem;color:#2b3651\"><span style=\"position:absolute;left:0;top:0;color:#0070f3;font-weight:700\">○<\u002Fspan>TensorRT optimization for embedded speed<\u002Fli>\n        <li style=\"position:relative;padding-left:1.8rem;margin-bottom:.7rem;color:#2b3651\"><span style=\"position:absolute;left:0;top:0;color:#0070f3;font-weight:700\">○<\u002Fspan>Jetson ↔ Pixhawk communication in flight<\u002Fli>\n        <li style=\"position:relative;padding-left:1.8rem;margin-bottom:.7rem;color:#2b3651\"><span style=\"position:absolute;left:0;top:0;color:#0070f3;font-weight:700\">○<\u002Fspan>First autonomous tracking flight + demo video<\u002Fli>\n      <\u002Ful>\n      <div data-reveal=\"\" style=\"background:#fff;border-left:4px solid #0070f3;border-radius:10px;padding:1.1rem 1.3rem;box-shadow:0 8px 24px rgba(0,43,92,.07);margin:1.2rem 0;opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)\">\n        <p style=\"margin:0;font-size:1.05rem;color:#2b3651\"><strong style=\"color:#002b5c\">Honest status:<\u002Fstrong> this is a live project, not a finished one. I'm documenting it as I go — the goal is a working onboard demo, and this page will grow with real footage as it comes together.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <div style=\"text-align:center;padding:3rem 1.5rem 4rem\">\n    <p style=\"font-family:'IBM Plex Mono',monospace;color:#002b5c;font-size:1.05rem\">Follow the build and the code<\u002Fp>\n    <div style=\"display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin-top:1.2rem\">\n      <a href=\"REPLACE_WITH_DRONE_GITHUB_URL\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:600;text-decoration:none;padding:.6rem 1.1rem;border-radius:8px;display:inline-flex;align-items:center;gap:.5rem;background:#002b5c;color:#fff;box-shadow:0 8px 20px r  helpers ----\n  clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }\n  lerp(a, b, t) { return a + (b - a) * t; }\n  smooth(t) { t = this.clamp(t, 0, 1); return t * t * (3 - 2 * t); }\n  q(sel) { return this.root ? this.root.querySelector(sel) : null; }\n  qa(sel) { return this.root ? Array.from(this.root.querySelectorAll(sel)) : []; }\n\n  initReveal(n) {\n    this.root = document.querySelector('[data-drone-root]');\n    if (!this.root) { if (n < 60) setTimeout(() => this.initReveal(n + 1), 60); return; }\n    const els = this.qa('[data-reveal]');\n    if (this.reduced) { els.forEach(e => { e.style.opacity = '1'; e.style.transform = 'none'; }); return; }\n    const obs = new IntersectionObserver((es) => es.forEach(e => {\n      if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'none'; obs.unobserve(e.target); }\n    }), { threshold: 0.14 });\n    els.forEach((el, i) => { el.style.transitionDelay = (Math.min(i % 5, 4) * 0.06) + 's'; obs.observe(el); });\n  }\n\n  boot(n) {\n    if (!this._mounted) return;\n    this.root = document.querySelector('[data-drone-root]');\n    const canvas = this.root && this.root.querySelector('[data-canvas]');\n    if (!canvas) { if (n < 80) setTimeout(() => this.boot(n + 1), 60); return; }\n    if (!window.THREE || !this.hasWebGL()) {\n      if (!window.THREE && n < 80) { setTimeout(() => this.boot(n + 1), 60); return; }\n      this.showFallback(); return;\n    }\n    try { this.initThree(canvas); } catch (e) { console.warn('3D init failed', e); this.showFallback(); }\n  }\n\n  hasWebGL() {\n    try { const c = document.createElement('canvas'); return !!(c.getContext('webgl') || c.getContext('experimental-webgl')); }\n    catch (e) { return false; }\n  }\n\n  showFallback() {\n    const fb = this.q('[data-fallback]'); if (fb) fb.style.display = 'block';\n    ['[data-canvas]', '[data-svg]', '[data-hint]'].forEach(s => { const el = this.q(s); if (el) el.style.display = 'none'; });\n    this.qa('[data-card],[data-pill]').forEach(el => el.style.display = 'none');\n  }\n\n  // ---- three setup ----\n  initThree(canvas) {\n    const THREE = window.THREE;\n    this.THREE = THREE;\n    this.canvas = canvas;\n    this.stage = this.q('[data-stage]');\n\n    const renderer = new THREE.WebGLRenderer({ canvas, antialias: !this.mobile, alpha: true });\n    renderer.setClearColor(0x000000, 0);\n    if (renderer.outputEncoding !== undefined) renderer.outputEncoding = THREE.sRGBEncoding;\n    this.renderer = renderer;\n\n    const scene = new THREE.Scene();\n    this.scene = scene;\n    const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 400);\n    this.camera = camera;\n\n    scene.add(new THREE.HemisphereLight(0xffffff, 0xcfe0f7, 0.9));\n    const key = new THREE.DirectionalLight(0xffffff, 0.95); key.position.set(14, 22, 12); scene.add(key);\n    const fill = new THREE.DirectionalLight(0xbcd6f7, 0.45); fill.position.set(-12, 8, -6); scene.add(fill);\n    const rim = new THREE.PointLight(new THREE.Color(this.accent), 0.9, 120); rim.position.set(-8, 10, -18); scene.add(rim);\n\n    this.world = new THREE.Group(); scene.add(this.world);\n    this.buildModel();\n    this.addGroundShadow();\n\n    this._tmp = new THREE.Vector3();\n    this._onResize = () => this.resize();\n    window.addEventListener('resize', this._onResize);\n    this.resize();\n\n    const hint = this.q('[data-hint]');\n    this._hint = hint;\n\n    if (this.reduced) {\n      this.frame(performance.now(), 1);\n      this.qa('[data-card],[data-pill]').forEach(el => { el.style.opacity = '1'; });\n      this.q('[data-svg]') && this.qa('[data-line],[data-dot]').forEach(el => el.setAttribute('opacity', '0.85'));\n      if (hint) hint.style.display = 'none';\n      return;\n    }\n    this._start = performance.now();\n    const loop = (t) => { if (!this._mounted) return; this.frame(t); this._raf = requestAnimationFrame(loop); };\n    this._raf = requestAnimationFrame(loop);\n  }\n\n  resize() {\n    if (!this.stage) return;\n    const w = this.stage.clientWidth, h = this.stage.clientHeight;\n    this.vw = w; this.vh = h;\n    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, this.mobile ? 1 : 1.6));\n    this.renderer.setSize(w, h, false);\n    this.camera.aspect = w / h; this.camera.updateProjectionMatrix();\n    if (this.reduced) this.frame(performance.now(), 1);\n  }\n\n  mat(color, metal, rough, emissive, emi) {\n    const o = { color: new this.THREE.Color(color), metalness: metal, roughness: rough };\n    if (emissive) { o.emissive = new this.THREE.Color(emissive); o.emissiveIntensity = emi || 1; }\n    return new this.THREE.MeshStandardMaterial(o);\n  }\n  box(w, h, d, material, x, y, z) {\n    const m = new this.THREE.Mesh(new this.THREE.BoxGeometry(w, h, d), material);\n    m.position.set(x || 0, y || 0, z || 0); return m;\n  }\n  cyl(rt, rb, h, material, x, y, z, seg) {\n    const m = new this.THREE.Mesh(new this.THREE.CylinderGeometry(rt, rb, h, seg || 24), material);\n    m.position.set(x || 0, y || 0, z || 0); return m;\n  }\n\n  buildModel() {\n    const THREE = this.THREE;\n    const matBlack = this.mat('#1b1e24', 0.4, 0.55);\n    const matPlate = this.mat('#16181d', 0.35, 0.6);\n    const matRedArm = this.mat('#cf2b2b', 0.25, 0.5);\n    const matWhiteArm = this.mat('#e9eef3', 0.15, 0.55);\n    const matRedMotor = this.mat('#d23636', 0.55, 0.4);\n    const matDark = this.mat('#2a2d33', 0.5, 0.5);\n    const matWhite = this.mat('#f2f5f8', 0.1, 0.5);\n    const matCopper = this.mat('#b5894e', 0.7, 0.4);\n\n    // ---- airframe (stays as base) ----\n    const air = new THREE.Group(); this.world.add(air); this.airframe = air;\n\n    // center plates\n    const top = this.box(9.4, 0.34, 9.4, matPlate, 0, 0.55, 0);\n    const traces = this.box(8.2, 0.06, 8.2, matCopper, 0, 0.74, 0);\n    const bottom = this.box(9.4, 0.34, 9.4, matBlack, 0, -0.7, 0);\n    air.add(top, traces, bottom);\n    for (const sx of [-1, 1]) for (const sz of [-1, 1]) air.add(this.cyl(0.18, 0.18, 1.4, matDark, sx * 4, -0.07, sz * 4, 10));\n\n    // arms + motors + esc + props + legs\n    const dirs = [[1, 1], [-1, 1], [1, -1], [-1, -1]]; // x,z signs\n    this.propMeshes = [];\n    this.frontLeft = null;\n    dirs.forEach((d, i) => {\n      const ux = d[0] * Math.SQRT1_2, uz = d[1] * Math.SQRT1_2;\n      const arm = new THREE.Group();\n      arm.rotation.y = Math.atan2(ux, uz);\n      const isFront = d[1] > 0;\n      const armMat = isFront ? matRedArm : matWhiteArm;\n      const bar = this.box(1.7, 0.55, 12.5, armMat, 0, 0.45, 7.2); arm.add(bar);\n      // motor mount + motor\n      arm.add(this.cyl(1.25, 1.35, 0.5, matBlack, 0, 0.55, 13.6, 18));\n      const motor = this.cyl(1.15, 1.15, 1.5, matRedMotor, 0, 1.45, 13.6, 22); arm.add(motor);\n      arm.add(this.cyl(0.75, 0.85, 0.4, matDark, 0, 2.2, 13.6, 18));\n      arm.add(this.cyl(0.16, 0.16, 0.9, matDark, 0, 2.6, 13.6, 12));\n      // esc\n      const esc = this.box(1.5, 0.5, 2.2, matBlack, 0, 0.8, 6.5); arm.add(esc);\n      // prop\n      const prop = new THREE.Group(); prop.position.set(0, 2.95, 13.6);\n      const blade = this.box(11, 0.14, 1.15, matWhite, 0, 0, 0);\n      const b2 = this.box(11, 0.14, 1.15, matWhite, 0, 0, 0);\n      blade.rotation.x = 0.12; b2.rotation.x = -0.12; b2.rotation.y = Math.PI;\n      prop.add(blade, b2, this.cyl(0.4, 0.5, 0.5, matDark, 0, 0.1, 0, 14));\n      arm.add(prop); prop.rotation.y = i * 0.7;\n      this.propMeshes.push(prop);\n      // landing leg\n      const leg = this.cyl(0.22, 0.22, 6.5, matWhite, 0, -2.6, 11.5, 10);\n      leg.rotation.x = 0.42; arm.add(leg);\n      air.add(arm);\n      if (d[0] < 0 && d[1] > 0) this.frontLeft = { arm: arm, motor: motor, esc: esc, prop: prop, ux, uz };\n    });\n\n    // GPS mast (front, stays with airframe)\n    const gps = new THREE.Group(); gps.position.set(2.6, 0, 3.2);\n    gps.add(this.cyl(0.16, 0.16, 7, matDark, 0, 4, 0, 10));\n    const puck = this.cyl(2, 2, 0.55, matBlack, 0, 7.5, 0, 28); puck.rotation.z = 0.12; gps.add(puck);\n    gps.add(this.cyl(2.02, 2.02, 0.12, this.mat('#0c0e12', 0.3, 0.6), 0, 7.82, 0, 28));\n    air.add(gps); this.gpsGroup = gps;\n\n    // ---- Layer 1: Pixhawk ----\n    const pix = new THREE.Group(); this.world.add(pix);\n    pix.add(this.box(5, 1.5, 8, this.mat('#191c21', 0.4, 0.5), 0, 0, 0));\n    pix.add(this.box(4.5, 0.25, 7.4, this.mat('#26292f', 0.45, 0.5), 0, 0.8, 0));\n    const ledMat = (c) => this.mat('#111', 0.3, 0.5, c, 1.2);\n    pix.add(this.box(0.35, 0.18, 0.35, ledMat(this.accent), -1.4, 0.95, 3.2));\n    pix.add(this.box(0.35, 0.18, 0.35, ledMat('#e23b3b'), -0.9, 0.95, 3.2));\n    pix.add(this.box(0.35, 0.18, 0.35, ledMat('#37c46a'), -0.4, 0.95, 3.2));\n    pix.add(this.box(4, 0.4, 0.5, matCopper, 0, 0.55, -3.6)); // pin header\n    this.pixGroup = pix;\n\n    // ---- Layer 2: LiPo battery ----\n    const bat = new THREE.Group(); this.world.add(bat);\n    bat.add(this.box(3.9, 2.5, 10.6, this.mat('#aab2bd', 0.6, 0.35), 0, 0, 0));\n    bat.add(this.box(4.0, 1.0, 10.7, this.mat('#0a2a52', 0.3, 0.5), 0, 0.2, 0)); // navy wrap\n    bat.add(this.box(3.0, 0.1, 4.2, this.mat('#cfd6df', 0.4, 0.5), 0, 1.27, 0)); // label patch\n    bat.add(this.cyl(0.22, 0.22, 2.6, this.mat('#c0392b', 0.2, 0.5), -0.7, 0.6, 6.2, 10)); // red lead\n    bat.add(this.cyl(0.22, 0.22, 2.6, this.mat('#1a1c20', 0.2, 0.5), 0.7, 0.6, 6.2, 10)); // black lead\n    this.batGroup = bat;\n\n    // ---- Layer 3: Jetson + camera ----\n    const jet = new THREE.Group(); this.world.add(jet);\n    jet.add(this.box(7.6, 0.45, 9.6, this.mat('#0e2018', 0.3, 0.55), 0, 0, 0)); // carrier pcb\n    jet.add(this.box(5.2, 0.7, 5.2, this.mat('#15181d', 0.5, 0.45), 0, 0.55, -0.6)); // heatsink base\n    const finMat = this.mat('#1c1f25', 0.55, 0.4);\n    for (let i = 0; i < 9; i++) jet.add(this.box(0.2, 1.5, 4.6, finMat, -2.2 + i * 0.55, 1.6, -0.6));\n    // camera on a small mast at the front\n    jet.add(this.cyl(0.14, 0.14, 1.6, matDark, 0, 0.9, 4.4, 10));\n    const cam = new THREE.Group(); cam.position.set(0, 1.7, 4.6);\n    cam.add(this.box(1.8, 1.8, 0.7, this.mat('#101216', 0.4, 0.4), 0, 0, 0));\n    cam.add(this.cyl(0.55, 0.55, 0.35, this.mat('#05070a', 0.3, 0.3), 0, 0, 0.45, 18).rotateX ? this.lensFix(0, 0, 0.45) : this.box(0,0,0,matDark));\n    cam.add(this.cyl(0.62, 0.62, 0.12, this.mat('#111', 0.3, 0.4, this.accent, 1.4), 0, 0, 0.6, 22).rotateX ? this.ring(0, 0, 0.6) : this.box(0,0,0,matDark));\n    cam.add(this.box(1.0, 1.0, 0.5, this.mat('#101216', 0.4, 0.4), 1.6, 0, 0)); // 2nd small cam\n    jet.add(cam); this.camNode = cam; this.jetGroup = jet;\n\n    // anchors (local offsets)\n    this.parts = {\n      pix: { group: pix, off: new THREE.Vector3(0, 0.8, 0), side: 'right', yC: 1.0, yO: 4.6, t0: 0.04, t1: 0.42 },\n      bat: { group: bat, off: new THREE.Vector3(0, 1.3, 0), side: 'left', yC: 2.4, yO: 8.6, t0: 0.16, t1: 0.60 },\n      jet: { group: jet, off: new THREE.Vector3(0, 1.8, 0), side: 'right', yC: 4.0, yO: 12.8, t0: 0.30, t1: 0.80 }\n    };\n  }\n\n  // lens helper: vertical cylinder rotated to face +Z\n  lensFix(x, y, z) { const m = this.cyl(0.55, 0.55, 0.4, this.mat('#05070a', 0.3, 0.3), x, y, z, 18); m.rotation.x = Math.PI / 2; return m; }\n  ring(x, y, z) { const m = this.cyl(0.62, 0.62, 0.12, this.mat('#111', 0.3, 0.4, this.accent, 1.5), x, y, z, 24); m.rotation.x = Math.PI / 2; return m; }\n\n  addGroundShadow() {\n    const THREE = this.THREE;\n    const c = document.createElement('canvas'); c.width = c.height = 128;\n    const g = c.getContext('2d');\n    const grd = g.createRadialGradient(64, 64, 4, 64, 64, 62);\n    grd.addColorStop(0, 'rgba(0,43,92,0.32)'); grd.addColorStop(1, 'rgba(0,43,92,0)');\n    g.fillStyle = grd; g.fillRect(0, 0, 128, 128);\n    const tex = new THREE.CanvasTexture(c);\n    const plane = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false }));\n    plane.rotation.x = -Math.PI / 2; plane.position.y = -7.5; this.scene.add(plane);\n  }\n\n  getProgress() {\n    if (this.reduced) return 1;\n    const sec = this.q('[data-scroll-section]'); if (!sec) return 0;\n    const r = sec.getBoundingClientRect();\n    const denom = r.height - window.innerHeight;\n    return this.clamp(-r.top / (denom || 1), 0, 1);\n  }\n\n  frame(t, forced) {\n    if (!this.renderer) return;\n    const p = (forced != null) ? forced : this.getProgress();\n    const e = this.smooth(p);\n    const time = (t - (this._start || t)) / 1000;\n\n    // layer lift\n    ['pix', 'bat', 'jet'].forEach(k => {\n      const o = this.parts[k];\n      const lp = this.clamp((p - o.t0) / (o.t1 - o.t0), 0, 1);\n      o.group.position.y = this.lerp(o.yC, o.yO, this.smooth(lp));\n      o.lp = lp;\n    });\n\n    // prop spin\n    if (this.doSpin) this.propMeshes.forEach((pr, i) => { pr.rotation.y += 0.5 + (i % 2 ? 0 : 0.04); });\n\n    // camera orbit\n    const radius = this.lerp(this.mobile ? 38 : 32, this.mobile ? 50 : 44, e);\n    const azim = this.lerp(0.62, 0.32, e) + (this.reduced ? 0 : Math.sin(time * 0.12) * 0.04);\n    const elev = this.lerp(0.52, 0.24, e);\n    const ty = this.lerp(2.4, 6.6, e);\n    const cx = Math.cos(elev) * Math.sin(azim) * radius;\n    const cz = Math.cos(elev) * Math.cos(azim) * radius;\n    const cy = Math.sin(elev) * radius + ty;\n    this.camera.position.set(cx, cy, cz);\n    this.camera.lookAt(0, ty, 0);\n\n    this.renderer.render(this.scene, this.camera);\n    this.layoutOverlay(p, e, time);\n  }\n\n  worldOf(group, off) {\n    group.getWorldPosition(this._tmp);\n    return { x: this._tmp.x + off.x, y: this._tmp.y + off.y, z: this._tmp.z + off.z };\n  }\n  project(wx, wy, wz) {\n    this._tmp.set(wx, wy, wz).project(this.camera);\n    return { x: (this._tmp.x * 0.5 + 0.5) * this.vw, y: (-this._tmp.y * 0.5 + 0.5) * this.vh, behind: this._tmp.z > 1 };\n  }\n  projGroup(part) {\n    const w = this.worldOf(part.group, part.off);\n    return this.project(w.x, w.y, w.z);\n  }\n\n  layoutOverlay(p, e, time) {\n    const W = this.vw, H = this.vh;\n    // hint fade\n    if (this._hint) this._hint.style.opacity = String(this.clamp(1 - p * 8, 0, 1));\n\n    // big callouts\n    ['pix', 'bat', 'jet'].forEach(k => {\n      const part = this.parts[k];\n      const sp = this.projGroup(part);\n      const card = this.q('[data-card=\"' + k + '\"]');\n      const line = this.q('[data-line=\"' + k + '\"]');\n      const dot = this.q('[data-dot=\"' + k + '\"]');\n      if (!card) return;\n      const op = this.clamp((part.lp - 0.04) / 0.28, 0, 1) * (sp.behind ? 0 : 1);\n      card.style.opacity = String(op);\n      line.setAttribute('opacity', String(op * 0.85));\n      dot.setAttribute('opacity', String(op));\n      const cw = card.offsetWidth || 248, ch = card.offsetHeight || 110;\n      const margin = Math.max(20, W * 0.035);\n      const cardX = part.side === 'left' ? margin : W - margin - cw;\n      const cardY = this.clamp(sp.y - ch / 2, 92, H - 70 - ch);\n      card.style.transform = 'translate(' + cardX + 'px,' + cardY + 'px)';\n      const edgeX = part.side === 'left' ? cardX + cw : cardX;\n      const edgeY = cardY + ch / 2;\n      line.setAttribute('x1', edgeX); line.setAttribute('y1', edgeY);\n      line.setAttribute('x2', sp.x); line.setAttribute('y2', sp.y);\n      dot.setAttribute('cx', sp.x); dot.setAttribute('cy', sp.y);\n    });\n\n    // pills on the front-left arm + gps\n    const fl = this.frontLeft;\n    const pillOp = this.clamp((p - 0.03) / 0.12, 0, 1) * (1 - this.clamp((p - 0.55) / 0.1, 0, 1) * 0.6);\n    const placePill = (sel, node, off, dy) => {\n      const el = this.q(sel); if (!el || !node) return;\n      node.getWorldPosition(this._tmp);\n      const sp = this.project(this._tmp.x, this._tmp.y + (off || 0), this._tmp.z);\n      el.style.opacity = String(sp.behind ? 0 : pillOp);\n      el.style.transform = 'translate(' + sp.x + 'px,' + (sp.y + (dy || 0)) + 'px) translate(-50%,-150%)';\n    };\n    if (fl) {\n      placePill('[data-pill=\"motor\"]', fl.motor, 1.4, -6);\n      placePill('[data-pill=\"esc\"]', fl.esc, 0.6, 26);\n      placePill('[data-pill=\"prop\"]', fl.prop, 1.2, -34);\n    }\n    if (this.gpsGroup) {\n      this._tmp.set(0, 0, 0); const gw = this.worldOf(this.gpsGroup, { x: 0, y: 7.8, z: 0 });\n      const sp = this.project(gw.x, gw.y, gw.z);\n      const el = this.q('[data-pill=\"gps\"]');\n      if (el) { el.style.opacity = String(sp.behind ? 0 : pillOp); el.style.transform = 'translate(' + sp.x + 'px,' + sp.y + 'px) translate(-50%,-150%)'; }\n    }\n\n    // data path camera -> jetson -> pixhawk\n    const flowOp = this.doFlow ? this.clamp((p - 0.5) / 0.18, 0, 1) : 0;\n    const poly = this.q('[data-flow]');\n    const dataCard = this.q('[data-card=\"data\"]');\n    if (dataCard) dataCard.style.opacity = String(flowOp);\n    if (poly) {\n      if (flowOp <= 0.001) { poly.setAttribute('opacity', '0'); [0, 1, 2].forEach(i => { const d = this.q('[data-flowdot=\"' + i + '\"]'); if (d) d.setAttribute('opacity', '0'); }); }\n      else {\n        this.camNode.getWorldPosition(this._tmp);\n        const a = this.project(this._tmp.x, this._tmp.y, this._tmp.z + 0.6);\n        const jw = this.worldOf(this.jetGroup, { x: 0, y: 0.5, z: -0.6 });\n        const b = this.project(jw.x, jw.y, jw.z);\n        const pw = this.worldOf(this.pixGroup, { x: 0, y: 0.4, z: 0 });\n        const c = this.project(pw.x, pw.y, pw.z);\n        poly.setAttribute('points', a.x + ',' + a.y + ' ' + b.x + ',' + b.y + ' ' + c.x + ',' + c.y);\n        poly.setAttribute('opacity', String(flowOp * 0.9));\n        if (!this.reduced) poly.setAttribute('stroke-dashoffset', String(-(time * 26 % 1000)));\n        const seg = (u) => {\n          if (u < 0.5) { const k = u / 0.5; return { x: this.lerp(a.x, b.x, k), y: this.lerp(a.y, b.y, k) }; }\n          const k = (u - 0.5) / 0.5; return { x: this.lerp(b.x, c.x, k), y: this.lerp(b.y, c.y, k) };\n        };\n        [0, 1, 2].forEach(i => {\n          const d = this.q('[data-flowdot=\"' + i + '\"]'); if (!d) return;\n          const u = ((time * 0.18 + i / 3) % 1);\n          const pt = seg(u);\n          d.setAttribute('cx', pt.x); d.setAttribute('cy', pt.y);\n          d.setAttribute('opacity', String(flowOp));\n        });\n      }\n    }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Drone.dc"}
